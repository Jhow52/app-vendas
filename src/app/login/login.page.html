<ion-content class="ion-padding login-content">

  <div class="login-container">

    <div class="login-logo">
      <ion-icon name="storefront-outline"></ion-icon>
      <h2>Sistema de Vendas</h2>
    </div>

    <ion-card>
      <ion-card-header>
        <ion-card-title>Acesso ao Sistema</ion-card-title>
      </ion-card-header>

      <ion-card-content>

        <ion-item>
          <ion-label position="floating">Usuário</ion-label>
          <ion-input
            type="text"
            [(ngModel)]="usuario.login"
            placeholder="Digite seu usuário">
          </ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Senha</ion-label>
          <ion-input
            type="password"
            [(ngModel)]="usuario.senha"
            placeholder="Digite sua senha">
          </ion-input>
        </ion-item>

        <div class="login-buttons">
          <ion-button expand="block" color="primary" (click)="avancar()">
            <ion-icon name="log-in-outline" slot="start"></ion-icon>
            Entrar
          </ion-button>

          <ion-button expand="block" color="medium" fill="outline" (click)="limparCampo()">
            <ion-icon name="refresh-outline" slot="start"></ion-icon>
            Limpar
          </ion-button>
        </div>

      </ion-card-content>
    </ion-card>

  </div>

</ion-content>
