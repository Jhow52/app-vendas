<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-button (click)="voltar()">
        <ion-icon name="arrow-back-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Cadastro de Produto</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card>
    <ion-card-header>
      <ion-card-title>{{ modoEdicao ? 'Editar Produto' : 'Novo Produto' }}</ion-card-title>
    </ion-card-header>

    <ion-card-content>

      <ion-item>
        <ion-label position="floating">Nome</ion-label>
        <ion-input type="text" [(ngModel)]="produto.nome"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Descrição</ion-label>
        <ion-input type="text" [(ngModel)]="produto.descricao"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Preço (R$)</ion-label>
        <ion-input type="number" [(ngModel)]="produto.preco"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Estoque</ion-label>
        <ion-input type="number" [(ngModel)]="produto.estoque"></ion-input>
      </ion-item>

      <div class="form-buttons">
        <ion-button expand="block" color="primary" (click)="salvar()">
          <ion-icon name="save-outline" slot="start"></ion-icon>
          {{ modoEdicao ? 'Atualizar' : 'Salvar' }}
        </ion-button>

        <ion-button expand="block" color="medium" fill="outline" (click)="limpar()">
          <ion-icon name="refresh-outline" slot="start"></ion-icon>
          Limpar
        </ion-button>
      </div>

    </ion-card-content>
  </ion-card>

  <ion-card *ngIf="produtos.length > 0">
    <ion-card-header>
      <ion-card-title>Produtos Cadastrados</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <ion-list>
        <ion-item *ngFor="let p of produtos">
          <ion-label>
            <h2>{{ p.nome }}</h2>
            <p>Preço: R$ {{ p.preco | number:'1.2-2' }} | Estoque: {{ p.estoque }}</p>
            <p *ngIf="p.descricao">{{ p.descricao }}</p>
          </ion-label>
          <ion-button fill="clear" color="primary" (click)="editar(p)">
            <ion-icon name="create-outline" slot="icon-only"></ion-icon>
          </ion-button>
          <ion-button fill="clear" color="danger" (click)="excluir(p.id)">
            <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
          </ion-button>
        </ion-item>
      </ion-list>
    </ion-card-content>
  </ion-card>

</ion-content>
