<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start"><ion-back-button defaultHref="/home"></ion-back-button></ion-buttons>
    <ion-title>Usuários</ion-title>
    <ion-buttons slot="end"><ion-button (click)="abrirForm()"><ion-icon slot="icon-only" name="add-outline"></ion-icon></ion-button></ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <ion-card *ngIf="mostrarForm">
    <ion-card-header><ion-card-title>{{ modoEdicao ? 'Editar' : 'Novo' }} Usuário</ion-card-title></ion-card-header>
    <ion-card-content>
      <ion-item><ion-label position="floating">Nome</ion-label><ion-input [(ngModel)]="formulario.nome"></ion-input></ion-item>
      <ion-item><ion-label position="floating">E-mail</ion-label><ion-input type="email" [(ngModel)]="formulario.email"></ion-input></ion-item>
      <ion-item><ion-label position="floating">Senha</ion-label><ion-input type="password" [(ngModel)]="formulario.senha"></ion-input></ion-item>
      <ion-item>
        <ion-label>Perfil</ion-label>
        <ion-select [(ngModel)]="formulario.perfil">
          <ion-select-option value="admin">Admin</ion-select-option>
          <ion-select-option value="vendedor">Vendedor</ion-select-option>
        </ion-select>
      </ion-item>
      <div class="btns-form">
        <ion-button fill="outline" (click)="fecharForm()">Cancelar</ion-button>
        <ion-button (click)="salvar()">Salvar</ion-button>
      </div>
    </ion-card-content>
  </ion-card>
  <ion-list>
    <ion-item *ngFor="let u of usuarios">
      <ion-label><h2>{{ u.nome }}</h2><p>{{ u.email }} — {{ u.perfil }}</p></ion-label>
      <ion-buttons slot="end">
        <ion-button fill="clear" (click)="abrirForm(u)"><ion-icon name="pencil-outline" color="primary"></ion-icon></ion-button>
        <ion-button fill="clear" (click)="excluir(u.id!)"><ion-icon name="trash-outline" color="danger"></ion-icon></ion-button>
      </ion-buttons>
    </ion-item>
  </ion-list>
  <ion-text color="medium" *ngIf="usuarios.length === 0"><p class="ion-text-center">Nenhum usuário cadastrado.</p></ion-text>
</ion-content>
