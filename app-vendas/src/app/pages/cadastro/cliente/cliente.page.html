<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start"><ion-back-button defaultHref="/home"></ion-back-button></ion-buttons>
    <ion-title>Clientes</ion-title>
    <ion-buttons slot="end"><ion-button (click)="abrirForm()"><ion-icon slot="icon-only" name="add-outline"></ion-icon></ion-button></ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <ion-card *ngIf="mostrarForm">
    <ion-card-header><ion-card-title>{{ modoEdicao ? 'Editar' : 'Novo' }} Cliente</ion-card-title></ion-card-header>
    <ion-card-content>
      <ion-item><ion-label position="floating">Nome</ion-label><ion-input [(ngModel)]="formulario.nome"></ion-input></ion-item>
      <ion-item><ion-label position="floating">CPF</ion-label><ion-input [(ngModel)]="formulario.cpf" placeholder="000.000.000-00"></ion-input></ion-item>
      <ion-item><ion-label position="floating">Telefone</ion-label><ion-input [(ngModel)]="formulario.telefone" placeholder="(00) 00000-0000"></ion-input></ion-item>
      <ion-item><ion-label position="floating">E-mail</ion-label><ion-input type="email" [(ngModel)]="formulario.email"></ion-input></ion-item>
      <div class="btns-form">
        <ion-button fill="outline" (click)="fecharForm()">Cancelar</ion-button>
        <ion-button (click)="salvar()">Salvar</ion-button>
      </div>
    </ion-card-content>
  </ion-card>
  <ion-list>
    <ion-item *ngFor="let c of clientes">
      <ion-label>
        <h2>{{ c.nome }}</h2>
        <p>CPF: {{ c.cpf }}</p>
        <p>{{ c.telefone }} — {{ c.email }}</p>
      </ion-label>
      <ion-buttons slot="end">
        <ion-button fill="clear" (click)="abrirForm(c)"><ion-icon name="pencil-outline" color="primary"></ion-icon></ion-button>
        <ion-button fill="clear" (click)="excluir(c.id!)"><ion-icon name="trash-outline" color="danger"></ion-icon></ion-button>
      </ion-buttons>
    </ion-item>
  </ion-list>
  <ion-text color="medium" *ngIf="clientes.length === 0"><p class="ion-text-center">Nenhum cliente cadastrado.</p></ion-text>
</ion-content>
