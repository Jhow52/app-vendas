<ion-header>
  <ion-toolbar color="primary">
    <ion-title>App Vendas</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="sair()"><ion-icon slot="icon-only" name="log-out-outline"></ion-icon></ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <div class="boas-vindas">
    <ion-icon name="person-circle-outline"></ion-icon>
    <p>Olá, <strong>{{ usuario?.nome }}</strong>!</p>
    <small>{{ usuario?.perfil }}</small>
  </div>
  <ion-grid>
    <ion-row>
      <ion-col size="6" *ngFor="let item of menus">
        <ion-card button (click)="navegar(item.rota)" class="menu-card">
          <ion-card-content>
            <ion-icon [name]="item.icone" [color]="item.cor"></ion-icon>
            <p>{{ item.titulo }}</p>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
